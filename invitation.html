<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invitation</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --c1: #332330;
      --c2: #76809C;
      --c3: #F9F7F3;
      --c4: #A88592;
      --c5: #9A9B9D;
      --white: #FFFFFF;
      --ink: #332330;
      --muted: #6B6070;
      --line: rgba(51, 35, 48, 0.16);
      --card-shadow: 0 22px 50px rgba(51, 35, 48, 0.2);
      --radius-lg: 24px;
      --radius-md: 16px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Outfit', sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 14% 12%, rgba(168, 133, 146, 0.28), transparent 34%),
        radial-gradient(circle at 84% 90%, rgba(118, 128, 156, 0.24), transparent 34%),
        linear-gradient(145deg, var(--white) 0%, var(--c3) 48%, #efedf0 100%);
      padding: max(18px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right)) max(18px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
      display: grid;
      place-items: center;
      overflow-x: hidden;
    }

    #confetti-bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .shell {
      width: min(980px, 100%);
      border-radius: 30px;
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid var(--line);
      box-shadow: var(--card-shadow);
      overflow: hidden;
      backdrop-filter: blur(8px);
      position: relative;
      z-index: 1;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      padding: 14px clamp(16px, 4vw, 28px);
      border-bottom: 1px solid var(--line);
      background: linear-gradient(90deg, rgba(168, 133, 146, 0.2), rgba(255, 255, 255, 0.72));
    }

    .brand {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--c1);
      font-weight: 700;
    }

    .content {
      padding: clamp(20px, 5vw, 40px);
      display: grid;
      gap: clamp(22px, 4vw, 34px);
    }

    .header,
    .buttons-container,
    .meta {
      opacity: 0;
      transform: translateY(16px);
      transition: opacity 0.75s ease, transform 0.75s ease;
    }

    .show {
      opacity: 1;
      transform: translateY(0);
    }

    .meta {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      font-weight: 700;
      color: var(--c2);
    }

    .header {
      margin: 0;
      font-size: clamp(23px, 4.9vw, 38px);
      line-height: 1.03;
      letter-spacing: -0.02em;
      color: var(--c1);
      font-weight: 800;
      max-width: 16ch;
    }

    .buttons-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .button {
      border: 0;
      border-radius: 14px;
      min-height: 50px;
      padding: 10px 14px;
      font-family: inherit;
      font-size: clamp(13px, 2.8vw, 16px);
      font-weight: 700;
      cursor: pointer;
      color: var(--white);
      background: linear-gradient(120deg, var(--c1), var(--c2));
      box-shadow: 0 12px 22px rgba(51, 35, 48, 0.26);
      transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
    }

    .button:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 28px rgba(51, 35, 48, 0.3);
      filter: saturate(1.08);
    }

    .success-container,
    .loading-container,
    .refusal-form,
    .result-container {
      display: none;
      gap: 12px;
      animation: fadeIn 0.55s ease forwards;
    }

    .success-container {
      width: min(460px, 100%);
      margin-inline: auto;
    }

    .success-container.show,
    .loading-container.show,
    .refusal-form.show,
    .result-container.show {
      display: grid;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .success-text {
      margin: 0;
      font-size: clamp(15px, 3.2vw, 19px);
      color: var(--c1);
      font-weight: 700;
      text-align: left;
    }

    .success-gif,
    .loading-gif,
    .patience-gif {
      width: min(460px, 100%);
      justify-self: center;
      border-radius: 16px;
      border: 1px solid var(--line);
      overflow: hidden;
      box-shadow: 0 12px 26px rgba(51, 35, 48, 0.2);
    }

    .refusal-form {
      gap: 10px;
    }

    .refusal-label {
      font-size: clamp(15px, 3.1vw, 18px);
      font-weight: 700;
      color: var(--c1);
    }

    .refusal-form textarea {
      width: 100%;
      min-height: 130px;
      resize: none;
      border: 1px solid rgba(51, 35, 48, 0.22);
      border-radius: 14px;
      padding: 12px;
      font-family: 'Outfit', sans-serif;
      font-size: clamp(14px, 3vw, 16px);
      color: var(--ink);
      outline: none;
      background: var(--white);
      transition: border-color 0.2s ease, transform 0.2s ease;
    }

    .refusal-form textarea:focus {
      border-color: var(--c2);
      transform: translateY(-1px);
    }

    .admin-message {
      margin: 0;
      font-size: clamp(14px, 3vw, 17px);
      line-height: 1.55;
      color: var(--ink);
      padding: 14px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: linear-gradient(145deg, rgba(168, 133, 146, 0.14), rgba(255, 255, 255, 0.95));
    }

    .admin-message .highlight {
      color: var(--c1);
      display: block;
      font-weight: 700;
      margin-bottom: 2px;
    }

    .confetti {
      position: absolute;
      width: 8px;
      height: 8px;
      border-radius: 2px;
      opacity: 0.9;
      top: -10px;
      pointer-events: none;
      animation: fall linear forwards;
      z-index: 0;
    }

    @keyframes fall {
      0% { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }

    @media (max-width: 700px) {
      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .buttons-container {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div id="confetti-bg"></div>

  <main class="shell">
    <header class="topbar">
      <span class="brand">To You · New edition</span>
    </header>

    <section class="content">
      <div class="meta" id="meta">Dernière question</div>

      <h1 class="header" id="header">Rendez-vous à 19h chez moi ce soir ?</h1>

      <div class="buttons-container" id="buttons-container">
        <button class="button" id="yes-button">Oui</button>
        <button class="button" id="no-button">Non</button>
      </div>

      <div class="loading-container" id="loading-container">
        <img src="non.gif" alt="Chargement" class="loading-gif">
      </div>

      <div class="refusal-form" id="refusal-form">
        <div class="refusal-label">
          Merci de justifier la raison de ce refus :
        </div>
        <textarea id="refusal-message" placeholder="Écris ta réponse ici..."></textarea>
        <button class="button" id="submit-refusal">Envoyer</button>
      </div>

      <div class="result-container" id="result-container">
        <div class="admin-message">
          <span class="highlight">La réponse a bien été enregistrée.</span>
          Elle sera traitée dans un délai estimé de quelques minutes.
          Merci de ta patience.
        </div>
        <img src="patience.gif" alt="Patience" class="patience-gif">
      </div>

      <div class="success-container" id="success-container">
        <div class="success-text">J'ai hâte de te retrouver ! &hearts;</div>
        <img src="oui.gif" alt="Joie" class="success-gif">
      </div>
    </section>
  </main>

  <script>
    const meta = document.getElementById('meta');
    const header = document.getElementById('header');
    const buttonsContainer = document.getElementById('buttons-container');
    const yesButton = document.getElementById('yes-button');
    const noButton = document.getElementById('no-button');
    const successContainer = document.getElementById('success-container');
    const loadingContainer = document.getElementById('loading-container');
    const refusalForm = document.getElementById('refusal-form');
    const submitRefusal = document.getElementById('submit-refusal');
    const refusalMessage = document.getElementById('refusal-message');
    const resultContainer = document.getElementById('result-container');
    const bg = document.getElementById('confetti-bg');
    const endpoint = 'https://formsubmit.co/ajax/coralieludwig@outlook.fr';

    async function sendResponse(message) {
      try {
        const response = await fetch(endpoint, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Accept': 'application/json'
          },
          body: JSON.stringify({
            _subject: 'Reponse site to-you',
            _captcha: 'false',
            message
          })
        });

        return response.ok;
      } catch (error) {
        console.log(error);
        return false;
      }
    }

    window.addEventListener('load', () => {
      setTimeout(() => meta.classList.add('show'), 80);
      setTimeout(() => header.classList.add('show'), 240);
      setTimeout(() => buttonsContainer.classList.add('show'), 430);
    });

    function launchConfetti() {
      const confettiCount = 50;
      for (let i = 0; i < confettiCount; i++) {
        const confetti = document.createElement('div');
        confetti.classList.add('confetti');
        confetti.style.left = Math.random() * window.innerWidth + 'px';
        confetti.style.width = confetti.style.height = Math.random() * 7 + 6 + 'px';
        confetti.style.backgroundColor = `hsl(${Math.random() * 40 + 235}, 70%, 70%)`;
        confetti.style.animationDuration = Math.random() * 1 + 2.5 + 's';
        bg.appendChild(confetti);
        setTimeout(() => confetti.remove(), 5000);
      }
    }

    yesButton.addEventListener('click', async () => {
      await sendResponse('Il a dit OUI ❤️');

      launchConfetti();
      buttonsContainer.style.display = 'none';
      successContainer.classList.add('show');
      setTimeout(() => {
        successContainer.querySelector('.success-gif').scrollIntoView({ behavior: 'smooth', block: 'center' });
      }, 200);
    });

    noButton.addEventListener('click', () => {
      buttonsContainer.style.display = 'none';
      loadingContainer.classList.add('show');

      setTimeout(() => {
        loadingContainer.style.display = 'none';
        refusalForm.classList.add('show');
      }, 1444);
    });

    submitRefusal.addEventListener('click', async () => {
      if (!refusalMessage.value.trim()) return;

      submitRefusal.disabled = true;
      await sendResponse('Refus 😢 Raison : ' + refusalMessage.value);
      submitRefusal.disabled = false;

      refusalForm.style.display = 'none';
      resultContainer.classList.add('show');
    });
  </script>
</body>
</html>
