<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Invitation</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-1: #09111d;
      --bg-2: #1a2233;
      --bg-3: #301e2f;
      --card: #f9f6f1;
      --text: #2a2230;
      --accent: #ff6f61;
      --accent-2: #ff8f7b;
      --shadow: 0 24px 60px rgba(0, 0, 0, 0.32);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: 'Montserrat', sans-serif;
      background:
        radial-gradient(circle at 15% 20%, rgba(255, 143, 123, 0.22), transparent 30%),
        radial-gradient(circle at 85% 80%, rgba(255, 111, 97, 0.2), transparent 35%),
        linear-gradient(140deg, var(--bg-1), var(--bg-2) 45%, var(--bg-3));
      color: var(--text);
      overflow-x: hidden;
      position: relative;
      padding: max(18px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right)) max(18px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
    }

    #confetti-bg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .message {
      background: linear-gradient(165deg, #fffaf5, var(--card));
      border-radius: 28px;
      border: 1px solid rgba(255, 255, 255, 0.65);
      box-shadow: var(--shadow);
      width: min(760px, 100%);
      padding: clamp(26px, 6vw, 56px);
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 1;
      position: relative;
      overflow: hidden;
    }

    .message::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, rgba(255, 111, 97, 0.08), rgba(255, 143, 123, 0.02) 36%, transparent 70%);
      pointer-events: none;
    }

    .header {
      font-size: clamp(28px, 6vw, 48px);
      font-weight: 700;
      color: var(--accent);
      text-align: center;
      margin-bottom: 34px;
      opacity: 0;
      transition: opacity 0.8s ease;
      position: relative;
      z-index: 1;
    }

    .buttons-container {
      display: flex;
      gap: 14px;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.8s ease;
      position: relative;
      z-index: 1;
      width: 100%;
    }

    .button {
      background: linear-gradient(160deg, var(--accent), var(--accent-2));
      color: #fff;
      border: none;
      border-radius: 16px;
      padding: 14px 24px;
      min-height: 52px;
      font-size: clamp(17px, 4.2vw, 24px);
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
      font-family: 'Montserrat', sans-serif;
      box-shadow: 0 12px 20px rgba(255, 111, 97, 0.25);
      flex: 1;
    }

    .button:hover {
      transform: translateY(-2px);
      filter: brightness(1.04);
      box-shadow: 0 14px 24px rgba(255, 111, 97, 0.32);
    }

    .success-container {
      display: none;
      flex-direction: column;
      align-items: center;
      margin-top: 22px;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .success-container.show {
      display: flex;
      animation: fadeIn 0.8s ease forwards;
    }

    .success-text {
      font-weight: bold;
      font-size: clamp(20px, 4.5vw, 26px);
      color: var(--accent);
      margin-bottom: 30px;
    }

    .success-gif {
      width: 100%;
      max-width: 400px;
      border-radius: 16px;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .loading-container {
      display: none;
      flex-direction: column;
      align-items: center;
      margin-top: 20px;
      text-align: center;
      width: 100%;
      position: relative;
      z-index: 1;
    }

    .loading-container.show {
      display: flex;
      animation: fadeIn 0.5s ease forwards;
    }

    .loading-gif {
      width: 100%;
      max-width: 400px;
      border-radius: 16px;
    }

    .refusal-form {
      display: none;
      flex-direction: column;
      gap: 20px;
      width: 100%;
      animation: fadeIn 0.5s ease forwards;
      position: relative;
      z-index: 1;
    }

    .refusal-form.show {
      display: flex;
    }

    .refusal-label {
      text-align: left;
      font-weight: bold;
      font-size: clamp(20px, 4.5vw, 26px);
      color: var(--accent);
    }

    .refusal-form textarea {
      resize: none;
      min-height: 150px;
      padding: 16px;
      border-radius: 12px;
      border: 2px solid rgba(255, 111, 97, 0.45);
      font-family: 'Montserrat', sans-serif;
      font-size: clamp(16px, 3.8vw, 18px);
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
      background: #fff;
    }

    .refusal-form textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(255, 111, 97, 0.18);
    }

    .result-container {
      display: none;
      flex-direction: column;
      align-items: center;
      width: 100%;
      margin-top: 30px;
      position: relative;
      z-index: 1;
    }

    .result-container.show {
      display: flex;
      animation: fadeIn 0.8s ease forwards;
    }

    .admin-message {
      text-align: left;
      font-size: clamp(18px, 4vw, 22px);
      color: #333333;
      line-height: 1.6;
      margin-bottom: 10px;
    }

    .admin-message .highlight {
      color: var(--accent);
      font-weight: bold;
      display: block;
    }

    .patience-gif {
      width: 100%;
      max-width: 400px;
      border-radius: 16px;
      margin-top: 30px;
    }

    .confetti {
      position: absolute;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      opacity: 0.9;
      top: -10px;
      pointer-events: none;
      animation: fall linear forwards;
      z-index: 0;
    }

    @keyframes fall {
      0% { transform: translateY(0px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }

    @media (max-width: 640px) {
      .buttons-container { flex-direction: column; }
      .button { width: 100%; }
    }
  </style>
</head>
<body>

  <div id="confetti-bg"></div>

  <div class="message">
    <div class="header" id="header">Rendez-vous à 19h chez moi ce soir ?</div>

    <div class="buttons-container" id="buttons-container">
      <button class="button" id="yes-button">Oui</button>
      <button class="button" id="no-button">Non</button>
    </div>

    <div class="loading-container" id="loading-container">
      <img src="non.gif" alt="Chargement" class="loading-gif">
    </div>

    <div class="refusal-form" id="refusal-form">
      <div class="refusal-label">
        Merci de justifier la raison de ce refus :
      </div>
      <textarea id="refusal-message" placeholder="Écris ta réponse ici..."></textarea>
      <button class="button" id="submit-refusal">Envoyer</button>
    </div>

    <div class="result-container" id="result-container">
      <div class="admin-message">
        <span class="highlight">La réponse a bien été enregistrée.</span>
        Elle sera traitée dans un délai estimé de quelques minutes. 
        Merci de ta patience.
      </div>
      <img src="patience.gif" alt="Patience" class="patience-gif">
    </div>

    <div class="success-container" id="success-container">
      <div class="success-text">J'ai hâte de te retrouver ! &hearts;</div>
      <img src="oui.gif" alt="Joie" class="success-gif">
    </div>
  </div>

<script>
  const header = document.getElementById('header');
  const buttonsContainer = document.getElementById('buttons-container');
  const yesButton = document.getElementById('yes-button');
  const noButton = document.getElementById('no-button');
  const successContainer = document.getElementById('success-container');
  const loadingContainer = document.getElementById('loading-container');
  const refusalForm = document.getElementById('refusal-form');
  const submitRefusal = document.getElementById('submit-refusal');
  const refusalMessage = document.getElementById('refusal-message');
  const resultContainer = document.getElementById('result-container');
  const bg = document.getElementById('confetti-bg');
  const endpoint = 'https://formsubmit.co/ajax/coralieludwig@outlook.fr';

  async function sendResponse(message) {
    try {
      const response = await fetch(endpoint, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Accept': 'application/json'
        },
        body: JSON.stringify({
          _subject: 'Reponse site to-you',
          _captcha: 'false',
          message
        })
      });

      return response.ok;
    } catch (error) {
      console.log(error);
      return false;
    }
  }

  window.addEventListener('load', () => {
    setTimeout(() => header.style.opacity = '1', 50);
    setTimeout(() => buttonsContainer.style.opacity = '1', 300);
  });

  function launchConfetti() {
    const confettiCount = 50;
    for (let i = 0; i < confettiCount; i++) {
      const confetti = document.createElement('div');
      confetti.classList.add('confetti');
      confetti.style.left = Math.random() * window.innerWidth + 'px';
      confetti.style.width = confetti.style.height = Math.random()*6+6 + 'px';
      confetti.style.backgroundColor = `hsl(${Math.random()*30+340}, 90%, 60%)`;
      confetti.style.animationDuration = (Math.random()*1+2.5)+'s';
      bg.appendChild(confetti);
      setTimeout(() => confetti.remove(), 5000);
    }
  }

  yesButton.addEventListener('click', async () => {
    await sendResponse('Il a dit OUI ❤️');

    launchConfetti();
    buttonsContainer.style.display = 'none';
    successContainer.classList.add('show');
  });

  noButton.addEventListener('click', () => {
    buttonsContainer.style.display = 'none';
    loadingContainer.classList.add('show');

    setTimeout(() => {
      loadingContainer.style.display = 'none';
      refusalForm.classList.add('show');
    }, 1444);
  });

  submitRefusal.addEventListener('click', async () => {
    if (!refusalMessage.value.trim()) return;

    submitRefusal.disabled = true;
    await sendResponse('Refus 😢 Raison : ' + refusalMessage.value);
    submitRefusal.disabled = false;

    refusalForm.style.display = 'none';
    resultContainer.classList.add('show');
  });
</script>

</body>
</html>
