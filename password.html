<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mot de passe</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --c1: #423D61;
      --c2: #8DA1C1;
      --c3: #B6BDD0;
      --c4: #D5D3DB;
      --c5: #F1DBD6;
      --white: #FFFFFF;
      --ink: #2f2a4f;
      --muted: #5c5a74;
      --line: rgba(66, 61, 97, 0.16);
      --card-shadow: 0 22px 50px rgba(66, 61, 97, 0.18);
      --radius-lg: 24px;
      --radius-md: 16px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Outfit', sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 12% 10%, rgba(141, 161, 193, 0.38), transparent 30%),
        radial-gradient(circle at 88% 90%, rgba(241, 219, 214, 0.5), transparent 34%),
        linear-gradient(145deg, var(--white) 0%, #f9faff 42%, #f7f4ff 100%);
      padding: max(18px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right)) max(18px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
      display: grid;
      place-items: center;
      overflow-x: hidden;
    }

    #confetti-bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .shell {
      width: min(980px, 100%);
      border-radius: 30px;
      background: rgba(255, 255, 255, 0.85);
      border: 1px solid var(--line);
      box-shadow: var(--card-shadow);
      overflow: hidden;
      backdrop-filter: blur(8px);
      position: relative;
      z-index: 1;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      padding: 14px clamp(16px, 4vw, 28px);
      border-bottom: 1px solid var(--line);
      background: linear-gradient(90deg, rgba(182, 189, 208, 0.45), rgba(255, 255, 255, 0.5));
    }

    .brand {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--c1);
      font-weight: 700;
    }

    .tag {
      font-size: 12px;
      color: var(--muted);
      background: rgba(141, 161, 193, 0.2);
      padding: 6px 10px;
      border-radius: 999px;
      font-weight: 600;
    }

    .content {
      padding: clamp(20px, 5vw, 40px);
      display: grid;
      gap: 14px;
    }

    .header,
    .middle,
    .password-container,
    .error-message,
    #help-footer {
      opacity: 0;
      transform: translateY(16px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }

    .show {
      opacity: 1;
      transform: translateY(0);
    }

    .header {
      margin: 0;
      font-size: clamp(38px, 8vw, 64px);
      line-height: 0.95;
      letter-spacing: -0.02em;
      color: var(--c1);
      font-weight: 800;
    }

    .middle p {
      margin: 0;
      font-size: clamp(18px, 3.8vw, 24px);
      line-height: 1.55;
      color: var(--ink);
      padding: 14px;
      border-radius: var(--radius-md);
      border: 1px solid var(--line);
      background: linear-gradient(140deg, rgba(255, 255, 255, 0.95), rgba(213, 211, 219, 0.42));
    }

    .highlight {
      color: var(--c1);
      font-weight: 700;
    }

    .password-container {
      display: grid;
      grid-template-columns: repeat(10, minmax(0, 1fr));
      gap: 8px;
      transition: transform 0.2s ease;
    }

    .password-container.shake {
      animation: shake 0.3s;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      50% { transform: translateX(5px); }
      75% { transform: translateX(-5px); }
    }

    .password-container input {
      width: 100%;
      min-width: 0;
      height: clamp(48px, 10vw, 64px);
      border: 1px solid rgba(66, 61, 97, 0.3);
      border-radius: 12px;
      font-size: clamp(18px, 4.4vw, 28px);
      text-align: center;
      font-family: 'Outfit', sans-serif;
      text-transform: uppercase;
      color: var(--ink);
      background: var(--white);
      outline: none;
      transition: transform 0.2s ease, border-color 0.2s ease, background-color 0.2s ease;
    }

    .password-container input:focus {
      transform: translateY(-2px);
      border-color: var(--c2);
      background: #fafdff;
    }

    .password-container input.revealed {
      color: var(--c1);
      font-weight: 700;
      border-color: var(--c2);
      background: #edf2fb;
    }

    .error-message {
      min-height: 28px;
      font-size: clamp(16px, 3.7vw, 20px);
      font-weight: 700;
      color: var(--c1);
    }

    .footer {
      display: flex;
      justify-content: flex-end;
    }

    .cta-button {
      border: 0;
      border-radius: 14px;
      min-height: 50px;
      padding: 11px 20px;
      font-family: inherit;
      font-size: clamp(15px, 3.5vw, 18px);
      font-weight: 700;
      cursor: pointer;
      color: var(--white);
      background: linear-gradient(120deg, var(--c1), var(--c2));
      box-shadow: 0 12px 22px rgba(66, 61, 97, 0.28);
      transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
    }

    .cta-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 28px rgba(66, 61, 97, 0.32);
      filter: saturate(1.08);
    }

    .success-container {
      display: none;
      flex-direction: column;
      align-items: center;
      margin-top: 6px;
      position: relative;
      opacity: 0;
    }

    .success-container.show {
      display: flex;
      animation: fadeIn 0.8s ease forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .success-text {
      font-size: clamp(28px, 7vw, 44px);
      font-weight: 800;
      color: var(--c1);
      margin-bottom: 8px;
      opacity: 0;
      text-align: center;
    }

    .success-text.show {
      animation: fadeIn 0.35s ease forwards;
    }

    .success-gif {
      width: min(460px, 100%);
      border-radius: 16px;
      border: 1px solid var(--line);
      overflow: hidden;
      box-shadow: 0 14px 34px rgba(66, 61, 97, 0.18);
      margin-bottom: 16px;
    }

    .success-gif img {
      width: 100%;
      display: block;
    }

    .success-container .footer {
      width: 100%;
      opacity: 0;
    }

    .success-container .footer.show {
      animation: fadeIn 0.35s ease 0.15s forwards;
    }

    .confetti {
      position: absolute;
      width: 8px;
      height: 8px;
      border-radius: 2px;
      opacity: 0.9;
      top: -10px;
      pointer-events: none;
      animation: fall linear forwards;
      z-index: 0;
    }

    @keyframes fall {
      0% { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }

    @media (max-width: 760px) {
      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .password-container {
        grid-template-columns: repeat(5, minmax(0, 1fr));
      }

      .footer,
      .success-container .footer {
        justify-content: stretch;
      }

      .cta-button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div id="confetti-bg"></div>

  <main class="shell">
    <header class="topbar">
      <span class="brand">To You · Private Edition</span>
      <span class="tag">Étape 2 / 4</span>
    </header>

    <section class="content">
      <h1 class="header" id="header">À toi de jouer !</h1>

      <div class="middle" id="middle">
        <p><span class="highlight">Indice :</span> Toi, raquette en main.</p>
      </div>

      <div class="password-container" id="password-container">
        <input maxlength="1" />
        <input maxlength="1" />
        <input maxlength="1" />
        <input maxlength="1" />
        <input maxlength="1" />
        <input maxlength="1" />
        <input maxlength="1" />
        <input maxlength="1" />
        <input maxlength="1" />
        <input maxlength="1" />
      </div>

      <div class="error-message" id="error-message"></div>

      <div class="footer" id="help-footer">
        <button class="cta-button" id="help-button">Besoin d'aide ?</button>
      </div>

      <div class="success-container" id="success-container">
        <div class="success-text" id="success-text"></div>
        <div class="success-gif">
          <img src="success.gif" alt="Célébration">
        </div>
        <div class="footer">
          <button class="cta-button" onclick="location.href='message.html'">Par ici !</button>
        </div>
      </div>
    </section>
  </main>

  <script>
    window.addEventListener('load', () => {
      const header = document.getElementById('header');
      const middle = document.getElementById('middle');
      const passwordContainer = document.getElementById('password-container');
      const errorMessage = document.getElementById('error-message');
      const helpFooter = document.getElementById('help-footer');

      setTimeout(() => header.classList.add('show'), 80);
      setTimeout(() => middle.classList.add('show'), 260);
      setTimeout(() => passwordContainer.classList.add('show'), 430);
      setTimeout(() => errorMessage.classList.add('show'), 500);
      setTimeout(() => helpFooter.classList.add('show'), 620);
    });

    window.addEventListener('load', () => {
      const inputs = document.querySelectorAll('.password-container input');
      const password = 'monstrueux';
      const errorMessage = document.getElementById('error-message');
      const successContainer = document.getElementById('success-container');
      const successText = document.getElementById('success-text');
      const container = document.getElementById('password-container');
      const bg = document.getElementById('confetti-bg');
      const helpButton = document.getElementById('help-button');
      const helpFooter = document.getElementById('help-footer');

      const messages = [
        'Mmmh, essaie encore. 🤔',
        'Non, toujours pas !',
        'La prochaine tentative sera la bonne ?'
      ];

      let attemptCount = 0;
      let firstAttempt = true;
      let revealedLetters = 0;

      function launchConfetti() {
        const confettiCount = 50;
        for (let i = 0; i < confettiCount; i++) {
          const confetti = document.createElement('div');
          confetti.classList.add('confetti');
          confetti.style.left = Math.random() * window.innerWidth + 'px';
          confetti.style.width = confetti.style.height = Math.random() * 7 + 6 + 'px';
          confetti.style.backgroundColor = `hsl(${Math.random() * 40 + 235}, 70%, 70%)`;
          confetti.style.animationDuration = Math.random() * 1 + 2.5 + 's';
          bg.appendChild(confetti);
          setTimeout(() => confetti.remove(), 5000);
        }
      }

      helpButton.addEventListener('click', () => {
        if (revealedLetters < password.length) {
          const input = inputs[revealedLetters];
          input.value = password[revealedLetters].toUpperCase();
          input.classList.add('revealed');
          input.disabled = true;
          revealedLetters++;

          const attempt = Array.from(inputs).map(i => i.value.toLowerCase()).join('');
          if (attempt === password) {
            errorMessage.style.display = 'none';
            inputs.forEach(i => i.disabled = true);
            launchConfetti();

            successText.textContent = 'Évidemment ! 🏆';

            helpFooter.style.opacity = '0';
            setTimeout(() => {
              helpFooter.style.display = 'none';

              successContainer.classList.add('show');
              setTimeout(() => successText.classList.add('show'), 100);
              setTimeout(() => {
                const footer = successContainer.querySelector('.footer');
                footer.classList.add('show');
              }, 100);
            }, 300);
          }
        }
      });

      inputs.forEach((input, idx) => {
        input.addEventListener('input', () => {
          if (input.classList.contains('revealed')) return;

          input.value = input.value.toUpperCase();
          if (input.value && idx < inputs.length - 1) {
            let nextIdx = idx + 1;
            while (nextIdx < inputs.length && inputs[nextIdx].classList.contains('revealed')) {
              nextIdx++;
            }
            if (nextIdx < inputs.length) inputs[nextIdx].focus();
          }

          const attempt = Array.from(inputs).map(i => i.value.toLowerCase()).join('');
          if (attempt.length === password.length) {
            if (attempt === password) {
              errorMessage.style.display = 'none';
              inputs.forEach(i => i.disabled = true);

              launchConfetti();

              successText.textContent = firstAttempt
                ? 'Du premier coup, évidemment ! 🏆'
                : 'Évidemment ! 🏆';

              helpFooter.style.opacity = '0';
              setTimeout(() => {
                helpFooter.style.display = 'none';

                successContainer.classList.add('show');
                setTimeout(() => successText.classList.add('show'), 100);
                setTimeout(() => {
                  const footer = successContainer.querySelector('.footer');
                  footer.classList.add('show');
                }, 100);
              }, 300);
            } else {
              attemptCount++;
              errorMessage.textContent = messages[Math.min(attemptCount - 1, messages.length - 1)];
              errorMessage.style.display = 'block';

              container.classList.add('shake');
              setTimeout(() => container.classList.remove('shake'), 300);

              inputs.forEach(i => {
                if (!i.classList.contains('revealed')) i.value = '';
              });

              const firstNonRevealed = Array.from(inputs).find(i => !i.classList.contains('revealed'));
              if (firstNonRevealed) firstNonRevealed.focus();

              firstAttempt = false;
            }
          }
        });

        input.addEventListener('keydown', e => {
          if (e.key === 'Backspace' && !input.value && idx > 0) {
            let prevIdx = idx - 1;
            while (prevIdx >= 0 && inputs[prevIdx].classList.contains('revealed')) {
              prevIdx--;
            }
            if (prevIdx >= 0) inputs[prevIdx].focus();
          }
        });
      });
    });
  </script>
</body>
</html>
