<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mot de passe</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-a: #081826;
      --bg-b: #182744;
      --bg-c: #341b34;
      --surface: rgba(255, 250, 244, 0.92);
      --text: #261d2e;
      --muted: #665c70;
      --accent: #f7655b;
      --accent-2: #ff9d79;
      --line: rgba(255, 255, 255, 0.48);
      --shadow: 0 28px 72px rgba(5, 10, 24, 0.52);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: 'Manrope', sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 12% 18%, rgba(255, 157, 121, 0.28), transparent 32%),
        radial-gradient(circle at 88% 82%, rgba(247, 101, 91, 0.25), transparent 35%),
        linear-gradient(145deg, var(--bg-a), var(--bg-b) 46%, var(--bg-c));
      overflow-x: hidden;
      position: relative;
      padding: max(18px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right)) max(18px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
    }

    #confetti-bg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .message {
      width: min(820px, 100%);
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 30px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
      overflow: hidden;
      position: relative;
      z-index: 1;
      padding: clamp(26px, 6vw, 56px);
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .message::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(130deg, rgba(247, 101, 91, 0.1), rgba(255, 157, 121, 0.03) 40%, transparent 68%);
      pointer-events: none;
    }

    .message::after {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 10px;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
    }

    .header {
      font-family: 'Playfair Display', serif;
      font-size: clamp(34px, 7vw, 58px);
      font-weight: 600;
      color: var(--accent);
      text-align: left;
      margin-bottom: 8px;
      line-height: 1.2;
      word-wrap: break-word;
      opacity: 0;
      transition: opacity 0.8s ease;
      position: relative;
      z-index: 1;
    }

    .middle {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 6px;
      opacity: 0;
      transition: opacity 0.8s ease;
      position: relative;
      z-index: 1;
    }

    .middle p {
      font-size: clamp(18px, 3.7vw, 23px);
      margin: 0;
      line-height: 1.6;
      color: var(--muted);
    }

    .highlight {
      color: var(--accent);
      font-weight: bold;
    }

    .password-container {
      display: flex;
      gap: 10px;
      justify-content: center;
      transition: transform 0.2s ease;
      margin-bottom: 24px;
      opacity: 0;
      transition: opacity 0.8s ease, transform 0.2s ease;
      flex-wrap: nowrap;
      position: relative;
      z-index: 1;
    }

    .password-container.shake {
      animation: shake 0.3s;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      50% { transform: translateX(5px); }
      75% { transform: translateX(-5px); }
    }

    .password-container input {
      width: clamp(30px, 7.3vw, 44px);
      height: clamp(52px, 11vw, 70px);
      font-size: clamp(19px, 4.6vw, 28px);
      text-align: center;
      border-radius: 12px;
      border: 2px solid rgba(255, 111, 97, 0.5);
      background: rgba(255, 255, 255, 0.9);
      outline: none;
      text-transform: uppercase;
      transition: transform 0.2s ease, border-color 0.2s ease;
    }

    .password-container input:focus {
      transform: scale(1.07);
      border-color: var(--accent);
    }

    .password-container input.revealed {
      color: var(--accent);
      font-weight: bold;
      background: #fff4ef;
    }

    .error-message {
      text-align: left;
      color: var(--accent);
      font-weight: bold;
      font-size: clamp(17px, 4.2vw, 22px);
      margin-top: 0;
      min-height: 30px;
      position: relative;
      z-index: 1;
    }

    .success-container {
      display: none;
      flex-direction: column;
      align-items: center;
      margin-top: 20px;
      position: relative;
      opacity: 0;
      z-index: 1;
    }
    
    .success-container.show {
      display: flex;
      animation: fadeIn 1s ease forwards;
    }
    
    @keyframes fadeIn {
      to { opacity: 1; }
    }

    .success-text {
      font-weight: bold;
      font-size: clamp(19px, 4.2vw, 24px);
      color: var(--accent);
      margin-bottom: 10px;
      width: 100%;
      opacity: 0;
      text-align: center;
      align-self: center;
    }
    
    .success-text.show {
      animation: fadeIn 0.4s ease 0s forwards;
    }

    .success-gif {
      width: 100%;
      text-align: center;
      margin: 0 0 22px 0;
    }

    .success-gif img {
      max-width: 100%;
      height: auto;
    }
    
    .success-container .footer {
      width: 100%;
      opacity: 0;
    }
    
    .success-container .footer.show {
      animation: fadeIn 0.4s ease 0.2s forwards;
    }

    .footer {
      display: flex;
      justify-content: flex-end;
      opacity: 0;
      transition: opacity 0.8s ease;
      position: relative;
      z-index: 1;
    }

    #help-footer {
      margin-top: 8px;
    }

    .cta-button {
      background: linear-gradient(160deg, var(--accent), var(--accent-2));
      color: #fff;
      border: none;
      border-radius: 999px;
      padding: 14px 24px;
      min-height: 52px;
      font-size: clamp(17px, 4.3vw, 22px);
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
      box-shadow: 0 12px 20px rgba(255, 111, 97, 0.25);
    }

    .cta-button:hover {
      transform: translateY(-2px);
      filter: brightness(1.04);
      box-shadow: 0 14px 24px rgba(255, 111, 97, 0.32);
    }

    .confetti {
      position: absolute;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      opacity: 0.9;
      top: -10px;
      pointer-events: none;
      animation: fall linear forwards;
      z-index: 0;
    }

    @keyframes fall {
      0% { transform: translateY(0px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }

    @media (max-width: 640px) {
      .header { text-align: center; }
      .footer { justify-content: stretch; }
      .cta-button { width: 100%; }
      .password-container {
        justify-content: center;
        gap: 6px;
      }
      .password-container input {
        width: 30px;
        height: 50px;
      }
    }

  </style>
</head>
<body>
  <div id="confetti-bg"></div>

  <div class="message">
    <div class="header" id="header">À toi de jouer !</div>

    <div class="middle" id="middle">
      <p><span class="highlight">Indice :</span> Toi, raquette en main.</p>
    </div>

    <div class="password-container" id="password-container">
      <input maxlength="1" />
      <input maxlength="1" />
      <input maxlength="1" />
      <input maxlength="1" />
      <input maxlength="1" />
      <input maxlength="1" />
      <input maxlength="1" />
      <input maxlength="1" />
      <input maxlength="1" />
      <input maxlength="1" />
    </div>

    <div class="error-message" id="error-message"></div>

    <div class="footer" id="help-footer">
      <button class="cta-button" id="help-button">Besoin d'aide ?</button>
    </div>

    <div class="success-container" id="success-container">
      <div class="success-text" id="success-text"></div>
      <div class="success-gif">
        <img src="success.gif" alt="Célébration">
      </div>
      <div class="footer">
        <button class="cta-button" onclick="location.href='message.html'">Par ici !</button>
      </div>
    </div>
  </div>

  <script>
    window.addEventListener('load', () => {
      const header = document.getElementById('header');
      const middle = document.getElementById('middle');
      const passwordContainer = document.getElementById('password-container');
      const helpFooter = document.getElementById('help-footer');

      setTimeout(() => { header.style.opacity = '1'; }, 50);
      setTimeout(() => { middle.style.opacity = '1'; }, 300);
      setTimeout(() => { passwordContainer.style.opacity = '1'; }, 300);
      setTimeout(() => { helpFooter.style.opacity = '1'; }, 600);
    });

    window.addEventListener('load', () => {
      const inputs = document.querySelectorAll('.password-container input');
      const password = "monstrueux";
      const errorMessage = document.getElementById('error-message');
      const successContainer = document.getElementById('success-container');
      const successText = document.getElementById('success-text');
      const container = document.getElementById('password-container');
      const bg = document.getElementById('confetti-bg');
      const helpButton = document.getElementById('help-button');
      const helpFooter = document.getElementById('help-footer');

      const messages = [
        "Mmmh, essaie encore. 🤔",
        "Non, toujours pas !",
        "La prochaine tentative sera la bonne ?"
      ];

      let attemptCount = 0;
      let firstAttempt = true;
      let revealedLetters = 0;

      function launchConfetti() {
        const confettiCount = 50;
        for (let i = 0; i < confettiCount; i++) {
          const confetti = document.createElement('div');
          confetti.classList.add('confetti');
          confetti.style.left = Math.random() * window.innerWidth + 'px';
          confetti.style.width = confetti.style.height = Math.random()*6+6 + 'px';
          confetti.style.backgroundColor = `hsl(${Math.random()*30+340}, 90%, 60%)`;
          confetti.style.animationDuration = (Math.random()*1+2.5)+'s';
          bg.appendChild(confetti);
          setTimeout(() => confetti.remove(), 5000);
        }
      }

      helpButton.addEventListener('click', () => {
        if (revealedLetters < password.length) {
          const input = inputs[revealedLetters];
          input.value = password[revealedLetters].toUpperCase();
          input.classList.add('revealed');
          input.disabled = true;
          revealedLetters++;

          const attempt = Array.from(inputs).map(i => i.value.toLowerCase()).join('');
          if (attempt === password) {
            errorMessage.style.display = 'none';
            inputs.forEach(i => i.disabled = true);
            launchConfetti();

            successText.textContent = "Évidemment ! 🏆";
            
            helpFooter.style.opacity = '0';
            setTimeout(() => {
              helpFooter.style.display = 'none';
              
              successContainer.classList.add('show');
              setTimeout(() => successText.classList.add('show'), 100);
              setTimeout(() => {
                const footer = successContainer.querySelector('.footer');
                footer.classList.add('show');
              }, 100);
            }, 300);
          }
        }
      });

      inputs.forEach((input, idx) => {
        input.addEventListener('input', () => {
          if (input.classList.contains('revealed')) {
            return;
          }

          input.value = input.value.toUpperCase();
          if (input.value && idx < inputs.length - 1) {
            let nextIdx = idx + 1;
            while (nextIdx < inputs.length && inputs[nextIdx].classList.contains('revealed')) {
              nextIdx++;
            }
            if (nextIdx < inputs.length) inputs[nextIdx].focus();
          }

          const attempt = Array.from(inputs).map(i => i.value.toLowerCase()).join('');
          if (attempt.length === password.length) {
            if (attempt === password) {
              errorMessage.style.display = 'none';
              inputs.forEach(i => i.disabled = true);

              launchConfetti();

              successText.textContent = firstAttempt ? 
                "Du premier coup, évidemment ! 🏆" : 
                "Évidemment ! 🏆";
              
              helpFooter.style.opacity = '0';
              setTimeout(() => {
                helpFooter.style.display = 'none';
                
                successContainer.classList.add('show');
                setTimeout(() => successText.classList.add('show'), 100);
                setTimeout(() => {
                  const footer = successContainer.querySelector('.footer');
                  footer.classList.add('show');
                }, 100);
              }, 300);
            } else {
              attemptCount++;
              errorMessage.textContent = messages[Math.min(attemptCount-1, messages.length-1)];
              errorMessage.style.display = 'block';

              container.classList.add('shake');
              setTimeout(() => container.classList.remove('shake'), 300);

              inputs.forEach((i, index) => {
                if (!i.classList.contains('revealed')) {
                  i.value = '';
                }
              });
              
              let firstNonRevealed = Array.from(inputs).find(i => !i.classList.contains('revealed'));
              if (firstNonRevealed) firstNonRevealed.focus();
              
              firstAttempt = false;
            }
          }
        });

        input.addEventListener('keydown', (e) => {
          if(e.key === 'Backspace' && !input.value && idx > 0){
            let prevIdx = idx - 1;
            while (prevIdx >= 0 && inputs[prevIdx].classList.contains('revealed')) {
              prevIdx--;
            }
            if (prevIdx >= 0) inputs[prevIdx].focus();
          }
        });
      });
    });
  </script>
</body>
</html>
