<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mot de passe</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,700;1,600&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --paper: #f5f1ea;
      --paper-deep: #ece6dc;
      --ink: #121212;
      --muted: #5f5f5f;
      --accent: #d62158;
      --line: #181818;
      --shadow: 18px 18px 0 rgba(0, 0, 0, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Space Grotesk', sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 20% 12%, rgba(214, 33, 88, 0.07), transparent 34%),
        radial-gradient(circle at 80% 84%, rgba(0, 0, 0, 0.05), transparent 38%),
        repeating-linear-gradient(
          90deg,
          rgba(0, 0, 0, 0.03) 0,
          rgba(0, 0, 0, 0.03) 1px,
          transparent 1px,
          transparent 24px
        ),
        linear-gradient(180deg, var(--paper), var(--paper-deep));
      padding: max(20px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right)) max(20px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
      display: grid;
      place-items: center;
      overflow-x: hidden;
    }

    #confetti-bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .page {
      width: min(980px, 100%);
      border: 2px solid var(--line);
      background: rgba(255, 255, 255, 0.82);
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
      z-index: 1;
      padding: clamp(20px, 5vw, 40px);
      display: grid;
      gap: 14px;
    }

    .page::before {
      content: "02";
      position: absolute;
      right: clamp(6px, 2vw, 16px);
      bottom: clamp(-18px, -2vw, -10px);
      font-size: clamp(110px, 20vw, 260px);
      line-height: 0.75;
      color: rgba(0, 0, 0, 0.05);
      font-weight: 700;
      pointer-events: none;
    }

    .meta,
    .header,
    .middle,
    .password-container,
    .error-message,
    #help-footer {
      opacity: 0;
      transform: translateY(16px);
      transition: opacity 0.75s ease, transform 0.75s ease;
      position: relative;
      z-index: 1;
    }

    .show {
      opacity: 1;
      transform: translateY(0);
    }

    .meta {
      text-transform: uppercase;
      letter-spacing: 0.16em;
      font-size: clamp(11px, 2.5vw, 13px);
      color: var(--muted);
    }

    .header {
      margin: 0;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 600;
      font-size: clamp(44px, 12vw, 104px);
      line-height: 0.9;
    }

    .middle p {
      margin: 0;
      font-size: clamp(18px, 3.8vw, 24px);
      line-height: 1.55;
      border-left: 3px solid var(--line);
      padding-left: 12px;
    }

    .highlight {
      color: var(--accent);
      font-weight: 700;
    }

    .password-container {
      display: grid;
      grid-template-columns: repeat(10, minmax(0, 1fr));
      gap: 8px;
      margin-top: 6px;
      transition: transform 0.2s ease;
    }

    .password-container.shake {
      animation: shake 0.3s;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      50% { transform: translateX(5px); }
      75% { transform: translateX(-5px); }
    }

    .password-container input {
      width: 100%;
      min-width: 0;
      height: clamp(46px, 9.5vw, 62px);
      border: 2px solid var(--line);
      border-radius: 0;
      font-size: clamp(18px, 4.4vw, 28px);
      text-align: center;
      font-family: 'Space Grotesk', sans-serif;
      text-transform: uppercase;
      background: rgba(255, 255, 255, 0.86);
      outline: none;
      transition: background-color 0.2s ease, transform 0.2s ease, color 0.2s ease;
    }

    .password-container input:focus {
      transform: translateY(-2px);
      background: #fff;
    }

    .password-container input.revealed {
      color: var(--accent);
      font-weight: 700;
      background: #ffe4ee;
    }

    .error-message {
      min-height: 28px;
      color: var(--accent);
      font-weight: 700;
      font-size: clamp(16px, 3.8vw, 20px);
    }

    .footer {
      display: flex;
      justify-content: flex-end;
    }

    .cta-button {
      border: 2px solid var(--line);
      background: #fff;
      color: var(--ink);
      min-height: 50px;
      padding: 10px 20px;
      font-size: clamp(15px, 3.7vw, 18px);
      font-weight: 700;
      font-family: inherit;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      cursor: pointer;
      box-shadow: 6px 6px 0 #000;
      transition: transform 0.2s ease, background-color 0.2s ease, color 0.2s ease, box-shadow 0.2s ease;
    }

    .cta-button:hover {
      transform: translate(-2px, -2px);
      background: var(--accent);
      color: #fff;
      box-shadow: 9px 9px 0 #000;
    }

    .success-container {
      display: none;
      flex-direction: column;
      gap: 16px;
      align-items: center;
      margin-top: 4px;
      position: relative;
      z-index: 1;
      opacity: 0;
    }

    .success-container.show {
      display: flex;
      animation: fadeIn 0.8s ease forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .success-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(34px, 8.8vw, 56px);
      font-style: italic;
      color: var(--accent);
      opacity: 0;
      text-align: center;
    }

    .success-text.show {
      animation: fadeIn 0.35s ease forwards;
    }

    .success-gif {
      width: min(440px, 100%);
      border: 2px solid var(--line);
      box-shadow: 10px 10px 0 rgba(0, 0, 0, 0.12);
    }

    .success-gif img {
      width: 100%;
      display: block;
    }

    .success-container .footer {
      width: 100%;
      opacity: 0;
    }

    .success-container .footer.show {
      animation: fadeIn 0.35s ease 0.15s forwards;
    }

    .confetti {
      position: absolute;
      width: 8px;
      height: 8px;
      border-radius: 0;
      opacity: 0.9;
      top: -10px;
      pointer-events: none;
      animation: fall linear forwards;
      z-index: 0;
    }

    @keyframes fall {
      0% { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }

    @media (max-width: 760px) {
      .password-container {
        grid-template-columns: repeat(5, minmax(0, 1fr));
      }

      .footer,
      .success-container .footer {
        justify-content: stretch;
      }

      .cta-button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div id="confetti-bg"></div>

  <main class="page">
    <div class="meta" id="meta">Dossier sécurisé • Étape 2/4</div>

    <h1 class="header" id="header">À toi de jouer !</h1>

    <div class="middle" id="middle">
      <p><span class="highlight">Indice :</span> Toi, raquette en main.</p>
    </div>

    <div class="password-container" id="password-container">
      <input maxlength="1" />
      <input maxlength="1" />
      <input maxlength="1" />
      <input maxlength="1" />
      <input maxlength="1" />
      <input maxlength="1" />
      <input maxlength="1" />
      <input maxlength="1" />
      <input maxlength="1" />
      <input maxlength="1" />
    </div>

    <div class="error-message" id="error-message"></div>

    <div class="footer" id="help-footer">
      <button class="cta-button" id="help-button">Besoin d'aide ?</button>
    </div>

    <div class="success-container" id="success-container">
      <div class="success-text" id="success-text"></div>
      <div class="success-gif">
        <img src="success.gif" alt="Célébration">
      </div>
      <div class="footer">
        <button class="cta-button" onclick="location.href='message.html'">Par ici !</button>
      </div>
    </div>
  </main>

  <script>
    window.addEventListener('load', () => {
      const meta = document.getElementById('meta');
      const header = document.getElementById('header');
      const middle = document.getElementById('middle');
      const passwordContainer = document.getElementById('password-container');
      const errorMessage = document.getElementById('error-message');
      const helpFooter = document.getElementById('help-footer');

      setTimeout(() => { meta.classList.add('show'); }, 70);
      setTimeout(() => { header.classList.add('show'); }, 190);
      setTimeout(() => { middle.classList.add('show'); }, 340);
      setTimeout(() => { passwordContainer.classList.add('show'); }, 470);
      setTimeout(() => { errorMessage.classList.add('show'); }, 520);
      setTimeout(() => { helpFooter.classList.add('show'); }, 620);
    });

    window.addEventListener('load', () => {
      const inputs = document.querySelectorAll('.password-container input');
      const password = 'monstrueux';
      const errorMessage = document.getElementById('error-message');
      const successContainer = document.getElementById('success-container');
      const successText = document.getElementById('success-text');
      const container = document.getElementById('password-container');
      const bg = document.getElementById('confetti-bg');
      const helpButton = document.getElementById('help-button');
      const helpFooter = document.getElementById('help-footer');

      const messages = [
        'Mmmh, essaie encore. 🤔',
        'Non, toujours pas !',
        'La prochaine tentative sera la bonne ?'
      ];

      let attemptCount = 0;
      let firstAttempt = true;
      let revealedLetters = 0;

      function launchConfetti() {
        const confettiCount = 50;
        for (let i = 0; i < confettiCount; i++) {
          const confetti = document.createElement('div');
          confetti.classList.add('confetti');
          confetti.style.left = Math.random() * window.innerWidth + 'px';
          confetti.style.width = confetti.style.height = Math.random() * 7 + 6 + 'px';
          confetti.style.backgroundColor = `hsl(${Math.random() * 30 + 330}, 85%, 58%)`;
          confetti.style.animationDuration = Math.random() * 1 + 2.5 + 's';
          bg.appendChild(confetti);
          setTimeout(() => confetti.remove(), 5000);
        }
      }

      helpButton.addEventListener('click', () => {
        if (revealedLetters < password.length) {
          const input = inputs[revealedLetters];
          input.value = password[revealedLetters].toUpperCase();
          input.classList.add('revealed');
          input.disabled = true;
          revealedLetters++;

          const attempt = Array.from(inputs).map(i => i.value.toLowerCase()).join('');
          if (attempt === password) {
            errorMessage.style.display = 'none';
            inputs.forEach(i => i.disabled = true);
            launchConfetti();

            successText.textContent = 'Évidemment ! 🏆';

            helpFooter.style.opacity = '0';
            setTimeout(() => {
              helpFooter.style.display = 'none';

              successContainer.classList.add('show');
              setTimeout(() => successText.classList.add('show'), 100);
              setTimeout(() => {
                const footer = successContainer.querySelector('.footer');
                footer.classList.add('show');
              }, 100);
            }, 300);
          }
        }
      });

      inputs.forEach((input, idx) => {
        input.addEventListener('input', () => {
          if (input.classList.contains('revealed')) return;

          input.value = input.value.toUpperCase();
          if (input.value && idx < inputs.length - 1) {
            let nextIdx = idx + 1;
            while (nextIdx < inputs.length && inputs[nextIdx].classList.contains('revealed')) {
              nextIdx++;
            }
            if (nextIdx < inputs.length) inputs[nextIdx].focus();
          }

          const attempt = Array.from(inputs).map(i => i.value.toLowerCase()).join('');
          if (attempt.length === password.length) {
            if (attempt === password) {
              errorMessage.style.display = 'none';
              inputs.forEach(i => i.disabled = true);

              launchConfetti();

              successText.textContent = firstAttempt
                ? 'Du premier coup, évidemment ! 🏆'
                : 'Évidemment ! 🏆';

              helpFooter.style.opacity = '0';
              setTimeout(() => {
                helpFooter.style.display = 'none';

                successContainer.classList.add('show');
                setTimeout(() => successText.classList.add('show'), 100);
                setTimeout(() => {
                  const footer = successContainer.querySelector('.footer');
                  footer.classList.add('show');
                }, 100);
              }, 300);
            } else {
              attemptCount++;
              errorMessage.textContent = messages[Math.min(attemptCount - 1, messages.length - 1)];
              errorMessage.style.display = 'block';

              container.classList.add('shake');
              setTimeout(() => container.classList.remove('shake'), 300);

              inputs.forEach(i => {
                if (!i.classList.contains('revealed')) i.value = '';
              });

              const firstNonRevealed = Array.from(inputs).find(i => !i.classList.contains('revealed'));
              if (firstNonRevealed) firstNonRevealed.focus();

              firstAttempt = false;
            }
          }
        });

        input.addEventListener('keydown', e => {
          if (e.key === 'Backspace' && !input.value && idx > 0) {
            let prevIdx = idx - 1;
            while (prevIdx >= 0 && inputs[prevIdx].classList.contains('revealed')) {
              prevIdx--;
            }
            if (prevIdx >= 0) inputs[prevIdx].focus();
          }
        });
      });
    });
  </script>
</body>
</html>
